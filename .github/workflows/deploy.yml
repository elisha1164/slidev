name: Deploy Multiple Slidev to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4

      - name: ⚙️ 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安裝套件
        run: npm install

      - name: 🔨 執行所有簡報打包
        run: npm run build

      - name: 🚀 發布到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true