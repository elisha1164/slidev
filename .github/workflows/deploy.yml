name: Deploy Multiple Slidev to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 確保機器人具備寫入權限（這是先前 403 錯誤的預防保險）
    permissions:
      contents: write
      
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        with:
          # 關鍵修正：必須抓取完整歷史紀錄，差異偵測才能運作
          fetch-depth: 0

      - name: ⚙️ 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安裝套件
        run: npm install

      - name: 🔍 偵測變動的簡報檔案
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: presentations/*.md

      - name: 🔨 執行所有簡報打包
        run: npm run build

      - name: 🌐 安裝瀏覽器元件 (僅在有變動時執行)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npx playwright install --with-deps chromium

      - name: 📄 自動生成變動簡報的 PDF
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            filename=$(basename "$file" .md)
            echo "正在為 $filename 生成 PDF..."
            # 確保子目錄存在，避免匯出失敗
            mkdir -p "dist/$filename"
            # 修正輸出路徑：直接指向 dist 資料夾內
            npx slidev export "$file" --output "dist/$filename/slides.pdf"
          done

      - name: 📄 複製首頁目錄
        run: |
          mkdir -p dist
          cp public/index.html dist/index.html

      - name: 🚀 發布到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true