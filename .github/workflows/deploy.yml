# 版本號：1.2.0 | 修改主旨：加入從 gh-pages 分支繼承既有 PDF 的邏輯，避免未變動的簡報遺失 PDF
name: Deploy Multiple Slidev to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 📥 取得程式碼
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安裝套件
        run: npm install

      - name: 🔍 偵測變動的簡報檔案
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: presentations/*.md

      - name: 🔨 執行所有簡報打包
        run: |
          # 自動掃描 presentations 資料夾下所有的 .md 檔案並逐一打包
          for file in presentations/*.md; do
            filename=$(basename "$file" .md)
            echo "正在打包網頁版簡報: $filename ..."
            # 修正：將 --base 更改為相對路徑 "./"，避免 Hash 模式下的路由疊加錯誤
            npx slidev build "$file" --out "../dist/$filename" --base "./"
          done

      - name: 🌐 安裝瀏覽器元件 (僅在有變動時執行)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: npx playwright install --with-deps chromium

      - name: 📄 自動生成變動簡報的 PDF
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            filename=$(basename "$file" .md)
            echo "正在為 $filename 生成 PDF..."
            mkdir -p "dist/$filename"
            npx slidev export "$file" --output "dist/$filename/slides.pdf"
          done

      - name: 📄 複製首頁目錄
        run: |
          mkdir -p dist
          cp public/index.html dist/index.html

      - name: 🔄 繼承既有的 PDF 檔案 (方案 B)
        run: |
          # 建立一個暫存目錄來存放 gh-pages 分支的內容
          mkdir -p /tmp/gh-pages
          # 嘗試將 gh-pages 分支 checkout 到暫存目錄。如果分支不存在（例如第一次部署），則忽略錯誤。
          git worktree add /tmp/gh-pages gh-pages || echo "gh-pages branch not found, skipping PDF inheritance."
          
          # 如果暫存目錄成功建立（代表 gh-pages 分支存在）
          if [ -d "/tmp/gh-pages" ]; then
            # 尋找所有在 gh-pages 分支下的 slides.pdf 檔案
            find /tmp/gh-pages -name "slides.pdf" | while read pdffile; do
              # 取得該 PDF 所在的相對路徑 (例如：/tmp/gh-pages/20260412/slides.pdf 變成 20260412/slides.pdf)
              relpath="${pdffile#/tmp/gh-pages/}"
              # 如果目前的 dist 目錄下「沒有」這個 PDF，就把它複製過來
              if [ ! -f "dist/$relpath" ]; then
                 # 先確保目標目錄存在
                 mkdir -p "dist/$(dirname "$relpath")"
                 # 複製 PDF
                 cp "$pdffile" "dist/$relpath"
                 echo "已繼承舊版 PDF: $relpath"
              fi
            done
            # 清理 worktree
            git worktree remove /tmp/gh-pages
          fi

      - name: 🚀 發布到 GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true