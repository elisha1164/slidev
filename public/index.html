<!-- 版本號：1.1.2 | 修改主旨：將 PDF 下載按鈕移入卡片內部右下方，優化排版 -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主日講道簡報庫</title>
    <style>
        /* --- 🎨 核心設計變數 --- */
        :root {
            --bg-color: #f4f6f8;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --card-bg: #ffffff;
            --hover-color: #0366d6;
            --border-radius: 8px;
        }

        /* --- 📝 基礎排版 --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 700px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        /* --- 🗂️ 簡報列表容器 --- */
        .slide-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem; /* 決定卡片之間的距離 */
        }

        /* --- 🃏 卡片本體設計 --- */
        .slide-list li {
            position: relative; /* 為了讓 PDF 按鈕可以絕對定位在卡片內 */
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            border: 1px solid #eaeaea;
            transition: all 0.2s ease;
        }

        /* --- ✨ 游標滑過效果 --- */
        .slide-list li:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-color: var(--hover-color);
        }

        .slide-list li:hover .title {
            color: var(--hover-color);
        }

        /* 將主連結內部間距獨立出來 */
        .main-link {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 1.2rem 1.5rem;
            text-decoration: none;
            color: var(--text-main);
        }

        /* --- 內部排版列 --- */
        .card-row-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .card-row-sub {
            display: flex;
            justify-content: flex-start;
            gap: 1.5rem;
            width: 100%;
            padding-right: 4.5rem; /* 預留右下角按鈕空間，防止文字重疊 */
            box-sizing: border-box;
        }

        /* --- 🔠 標題與日期文字 --- */
        .title {
            font-size: 1.15rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .date {
            font-size: 0.9rem;
            color: var(--text-muted);
            background: var(--bg-color);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* --- 🔠 經文與地點文字 --- */
        .meta-info {
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        /* --- PDF 下載按鈕 --- */
        .pdf-link {
            position: absolute;
            bottom: 1.2rem;
            right: 1.5rem;
            font-size: 0.8rem;
            color: #d32f2f;
            text-decoration: none;
            font-weight: 500;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background-color: rgba(211, 47, 47, 0.05);
            transition: all 0.2s ease;
            z-index: 2; /* 確保按鈕層級在主連結之上 */
        }

        .pdf-link:hover {
            background-color: rgba(211, 47, 47, 0.15);
        }

        /* 手機版響應式微調 */
        @media (max-width: 480px) {
            .card-row-main {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .card-row-sub {
                flex-direction: column;
                gap: 0.3rem;
            }
            .date {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <h1>📖 主日講道簡報庫</h1>

    <ul class="slide-list">
        
        <li>
            <a href="/slidev/20260517/" class="main-link">
                <div class="card-row-main">
                    <span class="title">驚喜好禮三重送</span>
                    <span class="date">20260517</span>
                </div>
                <div class="card-row-sub">
                    <span class="meta-info">📖 創世記 8:20-9:17</span>
                    <span class="meta-info">📍 鄉福滿州教會</span>
                </div>
            </a>
            <a href="/slidev/20260517/slides.pdf" class="pdf-link" title="下載 PDF">[PDF 下載]</a>
        </li>

        <li>
            <a href="/slidev/20260412/" class="main-link">
                <div class="card-row-main">
                    <span class="title">宇宙級的約定</span>
                    <span class="date">20260412</span>
                </div>
                <div class="card-row-sub">
                    <span class="meta-info">📖 創世記 8:1-19</span>
                    <span class="meta-info">📍 鄉福滿州教會</span>
                </div>
            </a>
            <a href="/slidev/20260412/slides.pdf" class="pdf-link" title="下載 PDF">[PDF 下載]</a>
        </li>

    </ul>

</body>
</html>
