<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主日講道簡報庫</title>
    <style>
        /* --- 🎨 核心設計變數 --- */
        :root {
            --bg-color: #f4f6f8;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --card-bg: #ffffff;
            --hover-color: #0366d6;
            --border-radius: 8px;
        }

        /* --- 📝 基礎排版 --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            max-width: 700px;
            margin: 0 auto;
            padding: 3rem 1.5rem;
            line-height: 1.6;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        /* --- 🗂️ 簡報列表容器 --- */
        .slide-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem; /* 決定卡片之間的距離 */
        }

        /* --- 🃏 卡片本體設計 --- */
        .slide-list li a {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            padding: 1.2rem 1.5rem;
            border-radius: var(--border-radius);
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 2px 5px rgba(0,0,0,0.04);
            border: 1px solid #eaeaea;
            transition: all 0.2s ease;
        }

        /* --- ✨ 游標滑過效果 --- */
        .slide-list li a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            border-color: var(--hover-color);
        }

        .slide-list li a:hover .title {
            color: var(--hover-color);
        }

        /* --- 🔠 標題與日期文字 --- */
        .title {
            font-size: 1.15rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .date {
            font-size: 0.9rem;
            color: var(--text-muted);
            background: var(--bg-color);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* 手機版響應式微調 */
        @media (max-width: 480px) {
            .slide-list li a {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .date {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <h1>📖 主日講道簡報庫</h1>

    <ul class="slide-list">
 
        <li>
            <a href="/slidev/20260412/">
                <span class="title">宇宙級的約定</span>
                <span class="date">20260412</span>
            </a>
            <a href="/slidev/20260412/slides.pdf" style="font-size: 0.8rem; color: #d32f2f;">[PDF 下載]</a>
        </li>

        <li>
            <a href="/slidev/20260517/">
                <span class="title">我的第一份 Slidev 簡報</span>
                <span class="date">20260517</span>
            </a>
            <a href="/slidev/20260517/slides.pdf" style="font-size: 0.8rem; color: #d32f2f;">[PDF 下載]</a>
        </li>

        </ul>

</body>
</html>
